---
- name: Install RAMCloud build + runtime dependencies on every host
  hosts: ramcloud
  become: yes
  gather_facts: no
  tasks:
    - name: apt update
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: apt install RAMCloud deps
      apt:
        state: present
        name:
          - build-essential
          - git
          - make
          - ccache
          - pkg-config
          - python2
          - python2-dev
          - libboost-all-dev
          - libprotobuf-dev
          - protobuf-compiler
          - libzookeeper-mt-dev
          - libpcrecpp0v5
          - libpcre3-dev
          - libibverbs-dev
          - librdmacm-dev
          - rdma-core
          - ibverbs-providers
          - ibverbs-utils
          - cmake
          - libssl-dev
          - doxygen
          - rsync
          - patch

    - name: Check Infiniband HCA presence
      command: ibv_devinfo
      register: ib_check
      changed_when: false
      failed_when: false

    - name: Note IB status
      debug:
        msg: >-
          {{ 'IB HCA detected'
             if (ib_check.stdout is defined and 'hca_id:' in ib_check.stdout)
             else 'WARNING no IB HCA - basic+infud will not work' }}
